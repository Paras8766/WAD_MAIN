<!DOCTYPE html lang="en">
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Social Media Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .fb-logo {
            font-size: 28px;
            font-weight: bold;
        }
        img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <!-- 🔥 NAVBAR -->
    <div class="bg-primary text-white py-2">
  <div class="container d-flex justify-content-between align-items-center">
    <!-- LEFT: Logo -->
    <div class="fw-bold fs-4">Facebook</div>
    <!-- RIGHT: Login -->
    <form class="d-flex align-items-end gap-2">
      <div>
        <label class="small">Email or Username</label>
        <input type="text" class="form-control form-control-sm">
      </div>
      <div>
        <label class="small">Password</label>
        <input type="password" class="form-control form-control-sm">
      </div>
      <button class="btn btn-light btn-sm">Log In</button>
    </form>
  </div>
</div>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h1 class="primary">Facebook is useless without friends.</h1>
                <h1 class="primary">Make more friends.</h1>
                <img src="image.png" alt="Facebook Logo" class="img-fluid">
            </div>
             <div class="col-md-6">
                <h1 class="primary">Create an account</h1>
                <p class="primary">It's free and always will be.</p>
                <form>
                    <div class="d-flex gap-2">
                        <input type="text" class="form-control mb-2 border border-dark" placeholder="First name">
                        <input type="text" class="form-control mb-2 border border-dark" placeholder="Last name">
                    </div>
                    <input type="email" class="form-control mb-2 border border-dark" placeholder="Email">
                    <input type="email" class="form-control mb-2 border border-dark" placeholder="Repeat Email">
                    <input type="password" class="form-control mb-2 border border-dark" placeholder="Password">
                    <input type="date" class="form-control mb-2 border border-dark" placeholder="Date of Birth">
                    <input type="radio" name="gender" class="form-check-input mb-2" value="male"> Male 
                    <input type="radio" name="gender" class="form-check-input mb-2" value="female"> Female
                </form>
                <p class="small">By clicking Sign Up, you agree to our Terms, Data Policy and Cookie Policy. You may receive SMS notifications from us and can opt out at any time.</p>
                <button class="btn btn-success">Sign Up</button>
            </div>
        </div>
    </div>
</body>

</html>
