<!DOCTYPE html>
<html>
<head>

    <title>MongoDB To-Do List</title>


    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }

        .container{
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input{
            width: 70%;
            padding: 10px;
        }

        button{
            padding: 10px;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        li{
            background: #eee;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btns button{
            margin-left: 5px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>MongoDB AJAX To-Do App</h2>

    <input type="text"
           id="taskInput"
           placeholder="Enter Task">

    <button onclick="addTask()">
        Add
    </button>

    <hr>

    <ul id="taskList"></ul>

</div>

<script>

const taskList = document.getElementById("taskList");
const taskInput = document.getElementById("taskInput");

document.addEventListener("DOMContentLoaded", fetchTasks);

async function fetchTasks() {

    const res = await fetch("/tasks");

    const tasks = await res.json();

    taskList.innerHTML = tasks.map(task => `

        <li>

            <span>${task.text}</span>

            <div class="btns">

                <button onclick="updateTask('${task._id}','${task.text}')">
                    Update
                </button>

                <button onclick="deleteTask('${task._id}')">
                    Delete
                </button>

            </div>

        </li>

    `).join("");
}

async function addTask() {

    if (!taskInput.value.trim()) return alert("Enter task");

    await fetch("/addTask", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            task: taskInput.value
        })
    });

    taskInput.value = "";

    fetchTasks();
}

async function updateTask(id, oldTask) {

    const updatedTask = prompt("Update Task", oldTask);

    if (!updatedTask) return;

    await fetch("/updateTask/" + id, {

        method: "PUT",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            task: updatedTask
        })
    });

    fetchTasks();
}

async function deleteTask(id) {

    await fetch("/deleteTask/" + id, {
        method: "DELETE"
    });

    fetchTasks();
}

</script>

</body>
</html>
