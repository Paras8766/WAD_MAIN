<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Registration</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-6">
          <div class="bg-white p-4 rounded shadow-sm">
            <h3 class="text-center mb-3">Event Registration</h3>

            <form class="needs-validation" novalidate>
              <div class="form-floating mb-3">
                <input
                  id="name"
                  class="form-control"
                  type="text"
                  placeholder="Full Name"
                  required
                  pattern="[A-Z][A-Za-z ]*"
                  data-bs-toggle="tooltip"
                  title="Start with capital letter"
                />
                <label for="name">Full Name</label>
                <div class="invalid-feedback">Start with capital, letters only.</div>
              </div>

              <div class="form-floating mb-3">
                <input
                  id="email"
                  class="form-control"
                  type="email"
                  placeholder="Email"
                  required
                  data-bs-toggle="tooltip"
                  title="Example: abc@gmail.com"
                />
                <label for="email">Email</label>
                <div class="invalid-feedback">Enter a valid email.</div>
              </div>

              <div class="form-floating mb-3">
                <input
                  id="phone"
                  class="form-control"
                  type="tel"
                  inputmode="numeric"
                  placeholder="Phone"
                  required
                  pattern="[0-9]{10}"
                  data-bs-toggle="tooltip"
                  title="10 digit mobile number"
                />
                <label for="phone">Phone</label>
                <div class="invalid-feedback">Enter exactly 10 digits.</div>
              </div>

              <div class="mb-3" id="genderGroup">
                <div class="mb-1">Gender</div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="gender"
                    id="gMale"
                    value="Male"
                    required
                  />
                  <label class="form-check-label" for="gMale">Male</label>
                </div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="gender"
                    id="gFemale"
                    value="Female"
                    required
                  />
                  <label class="form-check-label" for="gFemale">Female</label>
                </div>
              </div>

              <div class="form-floating mb-3">
                <select
                  id="city"
                  class="form-select"
                  required
                  data-bs-toggle="tooltip"
                  title="Select your city"
                >
                  <option value="">Choose</option>
                  <option>Pune</option>
                  <option>Mumbai</option>
                  <option>Delhi</option>
                </select>
                <label for="city">City</label>
                <div class="invalid-feedback">Select a city.</div>
              </div>

              <div class="form-floating mb-3">
                <select
                  id="event"
                  class="form-select"
                  required
                  data-bs-toggle="tooltip"
                  title="Select event type"
                >
                  <option value="">Choose</option>
                  <option>Workshop</option>
                  <option>Seminar</option>
                  <option>Hackathon</option>
                </select>
                <label for="event">Event</label>
                <div class="invalid-feedback">Select an event.</div>
              </div>

              <div class="form-floating mb-3">
                <input
                  id="date"
                  class="form-control"
                  type="date"
                  placeholder="Date"
                  required
                  data-bs-toggle="tooltip"
                  title="Choose a future date"
                />
                <label for="date">Event Date</label>
                <div class="invalid-feedback">Select a valid date.</div>
              </div>

              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="terms" required />
                <label class="form-check-label" for="terms">I agree to terms</label>
                <div class="invalid-feedback">Required.</div>
              </div>

              <button class="btn btn-primary w-100" type="submit">Register</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // 1) Tooltips
      document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach((el) => {
        new bootstrap.Tooltip(el);
      });

      // 2) Date: only today or future
      const dateInput = document.getElementById("date");
      dateInput.min = new Date().toISOString().split("T")[0];

      // 3) Validation (simple)
      const form = document.querySelector("form");

      form.addEventListener("submit", (e) => {
        if (!form.checkValidity()) e.preventDefault();
        form.classList.add("was-validated");
      });
    </script>
  </body>
</html>
