<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="hero">
      <p class="tag">Creative Board</p>
      <h1>Art Gallery</h1>
      <p class="subtitle">
        A static Node.js website inspired by Pinterest style layouts.
      </p>
    </header>

    <main class="gallery">
      <article class="pin">
        <img
          src="https://picsum.photos/seed/art1/600/840"
          alt="Abstract artwork"
        />
        <p>Abstract Rhythms</p>
      </article>
      <article class="pin">
        <img src="https://picsum.photos/seed/art2/600/960" alt="Street mural" />
        <p>Street Story</p>
      </article>
      <article class="pin">
        <img
          src="https://picsum.photos/seed/art3/600/780"
          alt="Watercolor painting"
        />
        <p>Watercolor Drift</p>
      </article>
      <article class="pin">
        <img
          src="https://picsum.photos/seed/art4/600/900"
          alt="Modern sculpture"
        />
        <p>Modern Form</p>
      </article>
      <article class="pin">
        <img
          src="https://picsum.photos/seed/art5/600/720"
          alt="Nature sketch"
        />
        <p>Nature Lines</p>
      </article>
      <article class="pin">
        <img
          src="https://picsum.photos/seed/art6/600/1020"
          alt="Digital art composition"
        />
        <p>Digital Bloom</p>
      </article>
      <article class="pin">
        <img
          src="https://picsum.photos/seed/art7/600/860"
          alt="Canvas texture details"
        />
        <p>Canvas Echo</p>
      </article>
      <article class="pin">
        <img
          src="https://picsum.photos/seed/art8/600/940"
          alt="Portrait painting"
        />
        <p>Portrait Study</p>
      </article>
    </main>
  </body>
</html>
